# 桌面版（macOS / Windows）建置與發佈
#
# 觸發方式：
#   - 推 v* tag（如 v1.0.0）→ 建置並開 GitHub Release，附 .dmg 與安裝版 .exe
#   - Actions 頁面手動 Run workflow → 只建置、存成 artifacts（不發佈）
#
# 產物未簽章：macOS 第一次開啟要在 app 上按右鍵 →「打開」略過 Gatekeeper；
# Windows SmartScreen 按「其他資訊 → 仍要執行」。
name: desktop-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.9" # 與本機開發版本一致

jobs:
  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package .dmg
        # 標準拖曳安裝盤：.app + Applications 捷徑
        run: |
          mkdir dmg-root
          cp -R build/macos/Build/Products/Release/gozero_go.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "XuanShi GoZero" -srcfolder dmg-root \
            -ov -format UDZO gozero_go-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/gozero_go-macos.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build installer (Inno Setup)
        working-directory: app/windows
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          if ("$env:GITHUB_REF" -notlike "refs/tags/*") { $version = "0.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: app/windows/gozero_go-setup.exe
          if-no-files-found: error

  release:
    # 只有推 tag 才發佈；手動觸發止於 artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            gozero_go-macos.dmg
            gozero_go-setup.exe
          body: |
            玄石 GoZero 桌面版。

            - **macOS**：開啟 `gozero_go-macos.dmg`，把 app 拖進 Applications；第一次開啟請在 app 上按右鍵 →「打開」（未簽章）。
            - **Windows**：執行 `gozero_go-setup.exe` 安裝；SmartScreen 出現時按「其他資訊 → 仍要執行」。

            需要連得到引擎伺服器才能對弈。
