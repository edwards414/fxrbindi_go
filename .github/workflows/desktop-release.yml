# 桌面版（macOS / Windows）建置與發佈
#
# 觸發方式：
#   - 推 v* tag（如 v1.0.0）→ 建置並開 GitHub Release 附上兩個 zip
#   - Actions 頁面手動 Run workflow → 只建置、把 zip 存成 artifacts（不發佈）
#
# 產物未簽章：macOS 第一次開啟要在 app 上按右鍵 →「打開」略過 Gatekeeper；
# Windows SmartScreen 按「其他資訊 → 仍要執行」。
name: desktop-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.9" # 與本機開發版本一致

jobs:
  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app bundle
        # ditto 保留 resource fork / 執行權限，Finder 解壓後可直接執行
        run: >
          ditto -c -k --keepParent
          build/macos/Build/Products/Release/gozero_go.app
          gozero_go-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: app/gozero_go-macos.zip
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip runner folder
        # Release/ 內含 exe + flutter dll + data/，整包缺一不可
        run: >
          Compress-Archive
          -Path build/windows/x64/runner/Release/*
          -DestinationPath gozero_go-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: app/gozero_go-windows.zip
          if-no-files-found: error

  release:
    # 只有推 tag 才發佈；手動觸發止於 artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            gozero_go-macos.zip
            gozero_go-windows.zip
          body: |
            玄石 GoZero 桌面版。

            - **macOS**：解壓 `gozero_go-macos.zip`，第一次開啟請在 app 上按右鍵 →「打開」（未簽章）。
            - **Windows**：解壓 `gozero_go-windows.zip` 後執行 `gozero_go.exe`；SmartScreen 出現時按「其他資訊 → 仍要執行」。

            需要連得到引擎伺服器才能對弈。
